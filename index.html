<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarCare Ultimate</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(180deg,#020617,#0b1220);
  color:white;
}

/* ANIMATION */
.fade {animation:fadeIn 0.3s ease;}
@keyframes fadeIn {
  from {opacity:0;transform:translateY(10px);}
  to {opacity:1;transform:translateY(0);}
}

/* HEADER */
.header {text-align:center;padding:20px;font-size:22px;font-weight:700;}

/* CARD */
.car-card {
  background:linear-gradient(135deg,#1f2937,#111827);
  padding:18px;border-radius:20px;margin:10px;
}

/* PANEL */
.panel {
  background:rgba(17,24,39,0.8);
  padding:15px;border-radius:20px;margin:10px;
}

/* TABS */
.tabs {display:flex;margin:10px;}
.tab {flex:1;text-align:center;padding:10px;border-radius:10px;}
.active {background:#22c55e;color:black;}

/* ITEM */
.item {
  background:#1f2937;
  padding:12px;
  border-radius:14px;
  margin-top:8px;
}

/* BADGE */
.badge-ok {color:#22c55e;}
.badge-warn {color:orange;}
.badge-danger {color:red;}

/* BUTTON */
button {border:none;padding:6px;border-radius:8px;margin-top:5px;}
.primary{background:#22c55e;}
.danger{background:#ef4444;}
.gray{background:#334155;}

input,select{width:100%;padding:8px;margin-top:5px;border-radius:8px;}

/* FAB */
.fab {
  position:fixed;bottom:20px;right:20px;
  width:65px;height:65px;border-radius:50%;
  background:#22c55e;font-size:30px;
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>

<body>

<div class="header">🚗 CarCare Ultimate</div>
<div id="app"></div>

<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];
let selectedCar=null;
let tab="entretien";
let showForm=false;

function save(){localStorage.setItem("cars",JSON.stringify(cars));}

/* STATUS DATE */
function getStatus(date){
  if(!date) return "";
  const d=new Date(date);
  const today=new Date();
  const diff=(d-today)/(1000*60*60*24);

  if(diff<0) return "<span class='badge-danger'>En retard</span>";
  if(diff<7) return "<span class='badge-warn'>Bientôt</span>";
  return "<span class='badge-ok'>OK</span>";
}

/* DASHBOARD */
function dashboard(car){
  let next = car.entretiens.find(e=>e.type==="Révision");

  if(!next || !next.date) return "";

  const d=new Date(next.date);
  const today=new Date();
  const total=30;
  const diff=(d-today)/(1000*60*60*24);

  let percent=Math.max(0,Math.min(100,(diff/total)*100));

  return `
  <div class="panel fade">
    Prochaine révision : ${next.date}<br>
    <div style="background:#020617;border-radius:10px;margin-top:8px;">
      <div style="width:${percent}%;height:8px;background:#22c55e;border-radius:10px;"></div>
    </div>
  </div>`;
}

/* HOME */
function home(){
  selectedCar=null;
  let html="";
  cars.forEach((c,i)=>{
    html+=`
    <div class="car-card fade" onclick="openCar(${i})">
      <b>${c.marque} ${c.modele}</b><br>
      ${c.plaque}<br>
      ${c.km} km
    </div>`;
  });
  html+=`<div class="fab" onclick="addCar()">+</div>`;
  app.innerHTML=html;
}

/* NAV */
function openCar(i){
  selectedCar=i;
  tab="entretien";
  showForm=false;
  render();
}

/* RENDER */
function render(){
  const car=cars[selectedCar];

  app.innerHTML=`
  <button onclick="home()">⬅</button>

  ${dashboard(car)}

  <div class="tabs">
    <div class="tab ${tab==="entretien"?"active":""}" onclick="tab='entretien';render()">Entretien</div>
    <div class="tab ${tab==="historique"?"active":""}" onclick="tab='historique';render()">Historique</div>
  </div>

  ${tab==="entretien"?renderEntretien():renderHist()}
  `;
}

/* ENTRETIEN */
function renderEntretien(){
  const car=cars[selectedCar];

  if(showForm){
    return `
    <div class="panel fade">
      <select id="type">
        <option>Révision</option>
        <option>Freins</option>
        <option>Distribution</option>
        <option>Réparation</option>
      </select>
      <input id="date" type="date">
      <input id="note" placeholder="Note">
      <button onclick="addEntretien()">Ajouter</button>
    </div>`;
  }

  return `
  <div class="panel fade">
    ${
      car.entretiens.map((e,i)=>`
      <div class="item">
        <b>${e.type}</b> ${getStatus(e.date)}<br>
        ${e.date}<br>
        <button onclick="done(${i})">✔</button>
        <button onclick="editE(${i})">✏️</button>
        <button onclick="delE(${i})">X</button>
      </div>`).join("")
    }
  </div>

  <div class="fab" onclick="showForm=true;render()">+</div>
  `;
}

/* HIST */
function renderHist(){
  const car=cars[selectedCar];
  return `
  <div class="panel fade">
    ${
      car.historique.map((e,i)=>`
      <div class="item">
        ${e.type} - ${e.km} km<br>
        ${e.date}
      </div>`).join("")
    }
  </div>`;
}

/* ACTIONS */
function addCar(){
  const m=prompt("Marque");
  if(!m)return;
  const mo=prompt("Modèle");
  const p=prompt("Plaque");
  const km=parseInt(prompt("Km"))||0;
  cars.push({marque:m,modele:mo,plaque:p,km,entretiens:[],historique:[]});
  save();home();
}

function addEntretien(){
  const car=cars[selectedCar];
  car.entretiens.push({
    type:type.value,
    date:date.value,
    note:note.value
  });
  save();showForm=false;render();
}

function done(i){
  const car=cars[selectedCar];
  const e=car.entretiens[i];

  const km=parseInt(prompt("Km actuel ?"));
  if(!km)return;

  car.km=km;
  car.historique.unshift({...e,km});

  if(e.type==="Révision"){
    const d=prompt("Prochaine date ?");
    if(d){
      car.entretiens.push({type:"Révision",date:d});
    }
  }

  car.entretiens.splice(i,1);
  save();render();
}

function editE(i){
  let e=cars[selectedCar].entretiens[i];
  e.date=prompt("Date",e.date)||e.date;
  save();render();
}

function delE(i){
  cars[selectedCar].entretiens.splice(i,1);
  save();render();
}

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

home();

</script>

</body>
</html>
