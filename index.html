<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarCare Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#22c55e">

<style>
body { margin:0;font-family:-apple-system;background:#0b1220;color:white;}
.header { text-align:center;padding:15px;background:#111827;}
.container { padding:15px;}

.car-card {
  background:#1f2937;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
}

.panel {
  background:#111827;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
}

.tabs { display:flex;background:#1f2937;border-radius:10px;overflow:hidden;}
.tab { flex:1;text-align:center;padding:10px;}
.active { background:#22c55e;color:black;}

.item {
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

button { border:none;padding:8px;border-radius:8px;margin-top:5px; }
.primary { background:#22c55e; }
.danger { background:#ef4444; }
.gray { background:#334155; }

input, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div class="header">🚗 CarCare Pro</div>
<div class="container" id="app"></div>

<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];
let selectedCar = null;
let tab = "entretien";
let showForm = false;

function save(){ localStorage.setItem("cars", JSON.stringify(cars)); }

/* HOME */
function home(){
  selectedCar=null;
  let html="";

  cars.forEach((c,i)=>{
    html+=`
      <div class="car-card" onclick="openCar(${i})">
        <b>${c.marque} ${c.modele}</b><br>
        ${c.plaque}<br>
        ${c.km} km
      </div>
    `;
  });

  html+=`<button onclick="addCar()" style="position:fixed;bottom:20px;right:20px;width:65px;height:65px;border-radius:50%;background:#22c55e;font-size:30px;">+</button>`;

  app.innerHTML=html;
}

/* OPEN */
function openCar(i){
  selectedCar=i;
  tab="entretien";
  showForm=false;
  render();
}

function switchTab(t){
  tab=t;
  showForm=false;
  render();
}

/* RENDER */
function render(){
  const car=cars[selectedCar];

  app.innerHTML=`
    <button class="gray" onclick="home()">⬅</button>

    <div class="panel">
      <b>${car.marque} ${car.modele}</b><br>
      ${car.plaque}<br>
      ${car.km} km
    </div>

    <div class="tabs">
      <div class="tab ${tab==="entretien"?"active":""}" onclick="switchTab('entretien')">Entretien</div>
      <div class="tab ${tab==="historique"?"active":""}" onclick="switchTab('historique')">Historique</div>
    </div>

    ${tab==="entretien"?renderEntretien():renderHist()}
  `;
}

/* ENTRETIEN */
function renderEntretien(){
  const car=cars[selectedCar];

  if(showForm){
    return `
    <div class="panel">
      <button class="gray" onclick="closeForm()">⬅</button>

      <select id="type">
        <option>Révision</option>
        <option>Freins</option>
        <option>Distribution</option>
        <option>Réparation</option>
      </select>

      <label>Date réalisation</label>
      <input id="date" type="date">

      <input id="note" placeholder="Note">

      <button class="primary" onclick="addEntretien()">Ajouter</button>
    </div>`;
  }

  return `
  <div class="panel">
    ${
      car.entretiens.map((e,i)=>`
        <div class="item">
          <b>${e.type}</b><br>
          📅 ${e.date}<br>
          ${e.note||""}

          <br>
          <button class="primary" onclick="done(${i})">✔</button>
          <button class="gray" onclick="editE(${i})">Modifier</button>
          <button class="danger" onclick="delE(${i})">X</button>
        </div>
      `).join("") || "Aucun"
    }
  </div>

  <button onclick="openForm()" style="position:fixed;bottom:20px;right:20px;width:65px;height:65px;border-radius:50%;background:#22c55e;font-size:30px;">+</button>
  `;
}

/* HISTORIQUE */
function renderHist(){
  const car=cars[selectedCar];

  return `
  <div class="panel">
    ${
      car.historique.map((e,i)=>`
        <div class="item">
          <b>${e.type}</b> - ${e.km} km<br>
          ${e.date}

          <br>
          <button class="gray" onclick="viewDetail(${i})">Détail</button>
          <button class="danger" onclick="delH(${i})">X</button>
        </div>
      `).join("") || "Aucun"
    }
  </div>`;
}

/* ACTIONS */
function addCar(){
  const m=prompt("Marque");
  const mo=prompt("Modèle");
  const p=prompt("Plaque");
  const km=prompt("Km");

  if(!m)return;

  cars.push({marque:m,modele:mo,plaque:p,km,entretiens:[],historique:[]});
  save(); home();
}

function addEntretien(){
  const car=cars[selectedCar];

  const type=document.getElementById("type").value;
  const date=document.getElementById("date").value;
  const note=document.getElementById("note").value;

  if(!date) return alert("Date obligatoire");

  car.entretiens.push({type,date,note});

  save(); showForm=false; render();
}

function done(i){
  const car=cars[selectedCar];
  const e=car.entretiens[i];

  const km=prompt("Kilométrage ?");
  if(!km)return;

  car.km=km;

  car.historique.unshift({...e,km});

  if(e.type==="Révision"){
    const next=prompt("Date prochaine révision");
    if(next){
      car.entretiens.push({type:"Révision",date:next,note:"Programmé"});
    }
  }

  car.entretiens.splice(i,1);

  save(); render();
}

function editE(i){
  const car=cars[selectedCar];
  const e=car.entretiens[i];

  const type=prompt("Type", e.type);
  const date=prompt("Date", e.date);
  const note=prompt("Note", e.note);

  if(type) e.type=type;
  if(date) e.date=date;
  if(note!==null) e.note=note;

  save(); render();
}

function viewDetail(i){
  const e=cars[selectedCar].historique[i];

  alert(
    "Type: "+e.type+"\n"+
    "Date: "+e.date+"\n"+
    "Km: "+e.km+"\n"+
    "Note: "+(e.note||"")
  );
}

function delE(i){
  cars[selectedCar].entretiens.splice(i,1);
  save(); render();
}

function delH(i){
  cars[selectedCar].historique.splice(i,1);
  save(); render();
}

function openForm(){ showForm=true; render(); }
function closeForm(){ showForm=false; render(); }

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

home();

</script>

</body>
</html>
