<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarCare Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(180deg,#0b1220,#020617);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:600;
  background:rgba(17,24,39,0.8);
  backdrop-filter:blur(10px);
}

/* CONTAINER */
.container {
  padding:15px;
}

/* CAR CARD */
.car-card {
  background:rgba(31,41,55,0.7);
  backdrop-filter:blur(10px);
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.2s;
}
.car-card:active {transform:scale(0.97);}

/* PANEL */
.panel {
  background:rgba(17,24,39,0.7);
  backdrop-filter:blur(12px);
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* TABS */
.tabs {
  display:flex;
  background:#1f2937;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
}
.tab {
  flex:1;
  text-align:center;
  padding:12px;
}
.active {
  background:#22c55e;
  color:black;
}

/* ITEM */
.item {
  background:rgba(31,41,55,0.8);
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}

/* BUTTON */
button {
  border:none;
  padding:8px;
  border-radius:10px;
  margin-top:5px;
}
button:active {transform:scale(0.95);}
.primary {background:#22c55e;}
.danger {background:#ef4444;}
.gray {background:#334155;}

/* INPUT */
input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

/* FLOAT BUTTON */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  font-size:32px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="header">🚗 CarCare Pro</div>
<div class="container" id="app"></div>

<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];
let selectedCar=null;
let tab="entretien";
let showForm=false;

function save(){localStorage.setItem("cars",JSON.stringify(cars));}

/* ALERT */
function checkAlerts(car){
  let msg="";
  car.entretiens.forEach(e=>{
    if(e.type==="Révision" && e.kmNext){
      if(car.km >= e.kmNext) msg+="⚠️ Révision en retard\\n";
      else if(car.km >= e.kmNext-1000) msg+="⏳ Révision bientôt\\n";
    }
  });
  if(msg) setTimeout(()=>alert(msg),500);
}

/* HOME */
function home(){
  selectedCar=null;
  let html="";
  cars.forEach((c,i)=>{
    html+=`
    <div class="car-card" onclick="openCar(${i})">
      <b>${c.marque} ${c.modele}</b><br>
      ${c.plaque}<br>
      ${c.km} km
    </div>`;
  });
  html+=`<div class="fab" onclick="addCar()">+</div>`;
  app.innerHTML=html;
}

/* NAV */
function openCar(i){
  selectedCar=i;
  tab="entretien";
  showForm=false;
  checkAlerts(cars[i]);
  render();
}
function switchTab(t){tab=t;render();}

/* RENDER */
function render(){
  const car=cars[selectedCar];

  app.innerHTML=`
  <button class="gray" onclick="home()">⬅</button>

  <div class="panel">
    <b>${car.marque} ${car.modele}</b><br>
    ${car.plaque}<br>
    ${car.km} km
  </div>

  <div class="tabs">
    <div class="tab ${tab==="entretien"?"active":""}" onclick="switchTab('entretien')">Entretien</div>
    <div class="tab ${tab==="historique"?"active":""}" onclick="switchTab('historique')">Historique</div>
  </div>

  ${tab==="entretien"?renderEntretien():renderHist()}
  `;
}

/* ENTRETIEN */
function renderEntretien(){
  const car=cars[selectedCar];

  if(showForm){
    return `
    <div class="panel">
      <button class="gray" onclick="showForm=false;render()">⬅</button>
      <select id="type">
        <option>Révision</option>
        <option>Freins</option>
        <option>Distribution</option>
        <option>Réparation</option>
      </select>
      <input id="date" type="date">
      <input id="note" placeholder="Note">
      <button class="primary" onclick="addEntretien()">Ajouter</button>
    </div>`;
  }

  return `
  <div class="panel">
    ${
      car.entretiens.map((e,i)=>`
      <div class="item">
        <b>${e.type}</b><br>
        📅 ${e.date}<br>
        ${e.note||""}
        ${e.kmNext?`<br>🎯 ${e.kmNext} km`:``}
        <br>
        <button class="primary" onclick="done(${i})">✔</button>
        <button class="gray" onclick="editE(${i})">Modifier</button>
        <button class="danger" onclick="delE(${i})">X</button>
      </div>`).join("") || "Aucun entretien"
    }
  </div>

  <div class="fab" onclick="showForm=true;render()">+</div>
  `;
}

/* HISTORIQUE */
function renderHist(){
  const car=cars[selectedCar];

  return `
  <div class="panel">
    ${
      car.historique.map((e,i)=>`
      <div class="item">
        <b>${e.type}</b> - ${e.km} km<br>
        ${e.date}
        <br>
        <button class="gray" onclick="viewDetail(${i})">Détail</button>
        <button class="danger" onclick="delH(${i})">X</button>
      </div>`).join("") || "Aucun historique"
    }
  </div>`;
}

/* ACTIONS */
function addCar(){
  const m=prompt("Marque");
  const mo=prompt("Modèle");
  const p=prompt("Plaque");
  const km=parseInt(prompt("Km"));
  if(!m) return;
  cars.push({marque:m,modele:mo,plaque:p,km:km||0,entretiens:[],historique:[]});
  save();home();
}

function addEntretien(){
  const car=cars[selectedCar];
  const type=document.getElementById("type").value;
  const date=document.getElementById("date").value;
  const note=document.getElementById("note").value;
  if(!date) return alert("Date obligatoire");
  car.entretiens.push({type,date,note});
  save();showForm=false;render();
}

function done(i){
  const car=cars[selectedCar];
  const e=car.entretiens[i];
  const km=parseInt(prompt("Kilométrage ?"));
  if(!km) return;
  car.km=km;
  car.historique.unshift({...e,km});

  if(e.type==="Révision"){
    const nextKm=parseInt(prompt("Prochaine révision (km) ?"));
    if(nextKm){
      car.entretiens.push({type:"Révision",date:"",note:"Programmé",kmNext:nextKm});
    }
  }

  car.entretiens.splice(i,1);
  save();render();
}

function editE(i){
  const e=cars[selectedCar].entretiens[i];
  e.type=prompt("Type",e.type)||e.type;
  e.date=prompt("Date",e.date)||e.date;
  e.note=prompt("Note",e.note)||e.note;
  save();render();
}

function viewDetail(i){
  const e=cars[selectedCar].historique[i];
  alert(`Type: ${e.type}\\nDate: ${e.date}\\nKm: ${e.km}\\nNote: ${e.note||""}`);
}

function delE(i){cars[selectedCar].entretiens.splice(i,1);save();render();}
function delH(i){cars[selectedCar].historique.splice(i,1);save();render();}

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

home();

</script>

</body>
</html>
